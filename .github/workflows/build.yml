name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - { name: linux-x64, os: ubuntu-latest, target: bun-linux-x64, opentui: "@opentui/core-linux-x64" }
          - { name: macos-x64, os: macos-latest, target: bun-darwin-x64, opentui: "@opentui/core-darwin-x64" }
          - { name: macos-arm64, os: macos-latest, target: bun-darwin-arm64, opentui: "@opentui/core-darwin-arm64" }
          - { name: windows-x64, os: windows-latest, target: bun-windows-x64, opentui: "@opentui/core-win32-x64" }

    env:
      CI: true
      TERM: xterm
      npm_config_yes: true

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        timeout-minutes: 10
        run: bun install --no-progress

      - name: Install platform-specific native packages
        timeout-minutes: 5
        run: bun add ${{ matrix.platform.opentui }}@0.1.97

      - name: Build standalone binary
        timeout-minutes: 15
        run: bun run build --target=${{ matrix.platform.target }}

      - name: Rename binary for release
        shell: bash
        run: |
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            mv dist/hdp.exe dist/hdp-${{ matrix.platform.name }}.exe
          else
            mv dist/hdp dist/hdp-${{ matrix.platform.name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdp-${{ matrix.platform.name }}
          path: dist/hdp-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
