name: Build Standalone Binaries

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - { name: linux-x64, os: ubuntu-latest, target: bun-linux-x64 }
          - { name: macos-x64, os: macos-latest, target: bun-darwin-x64 }
          - { name: macos-arm64, os: macos-latest, target: bun-darwin-arm64 }
          - { name: windows-x64, os: windows-latest, target: bun-windows-x64 }

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build standalone binary
        run: bun run build --target=${{ matrix.platform.target }}

      - name: Rename binary for release
        shell: bash
        run: |
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            mv dist/hdp.exe dist/hdp-${{ matrix.platform.name }}.exe
          else
            mv dist/hdp dist/hdp-${{ matrix.platform.name }}
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdp-${{ matrix.platform.name }}
          path: |
            dist/hdp-*

