name: Build and Release

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      matrix:
        platform:
          - { name: linux-x64, os: ubuntu-latest, target: bun-linux-x64, opentui: "@opentui/core-linux-x64", sqlitevec: "sqlite-vec-linux-x64" }
          - { name: macos-x64, os: macos-latest, target: bun-darwin-x64, opentui: "@opentui/core-darwin-x64", sqlitevec: "sqlite-vec-darwin-x64" }
          - { name: macos-arm64, os: macos-latest, target: bun-darwin-arm64, opentui: "@opentui/core-darwin-arm64", sqlitevec: "sqlite-vec-darwin-arm64" }
          - { name: windows-x64, os: windows-latest, target: bun-windows-x64, opentui: "@opentui/core-win32-x64", sqlitevec: "sqlite-vec-windows-x64" }

    env:
      CI: true
      TERM: xterm
      npm_config_yes: true

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.12

      - name: Install dependencies
        timeout-minutes: 10
        run: bun install --no-progress

      - name: Install platform-specific native packages
        timeout-minutes: 5
        run: |
          bun install --os="*" --cpu="*" ${{ matrix.platform.opentui }}@0.1.97
          bun install --os="*" --cpu="*" ${{ matrix.platform.sqlitevec }}@0.1.9

      - name: Build standalone binary
        timeout-minutes: 15
        run: bun run build --target=${{ matrix.platform.target }}

      - name: Package binary and native extensions
        shell: bash
        run: |
          # Create a temporary folder for the release contents
          mkdir -p hdp-release
          
          # Determine correct extension suffix
          EXT="so"
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then EXT="dll"; fi
          if [ "${{ matrix.platform.os }}" = "macos-latest" ] || [ "${{ matrix.platform.os }}" = "macos-13" ]; then EXT="dylib"; fi
          
          # Find and copy the downloaded vec0 native file into our release folder
          find node_modules -name "vec0.${EXT}" -exec cp {} hdp-release/ \; || true
          
          # Copy and rename the compiled binary into the folder
          if [ "${{ matrix.platform.os }}" = "windows-latest" ]; then
            cp dist/hdp.exe hdp-release/hdp.exe
            cd hdp-release
            zip -r ../dist/hdp-${{ matrix.platform.name }}.zip *
          else
            cp dist/hdp hdp-release/hdp
            cd hdp-release
            tar -czf ../dist/hdp-${{ matrix.platform.name }}.tar.gz *
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hdp-${{ matrix.platform.name }}
          path: dist/hdp-*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*
